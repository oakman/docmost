name: Release Registry (Reusable)

on:
  workflow_call:
    inputs:
      version:
        description: Version tag (e.g. v0.25.3)
        required: true
        type: string
      image:
        description: Full image name (e.g. docmost/docmost)
        required: true
        type: string
      registry:
        description: Registry host (e.g. docker.io or ghcr.io)
        required: true
        type: string
      registry_username:
        description: Registry username
        required: true
        type: string
      artifact_prefix:
        description: Prefix for workflow artifacts
        required: true
        type: string
      create_release:
        description: Create GitHub release with image archives
        required: false
        default: false
        type: boolean
    secrets:
      build_app_id:
        required: true
      build_app_private_key:
        required: true
      registry_password:
        required: true

permissions:
  contents: write
  packages: write

env:
  VERSION: ${{ inputs.version }}
  IMAGE: ${{ inputs.image }}
  ARTIFACT_PREFIX: ${{ inputs.artifact_prefix }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.build_app_id }}
          private-key: ${{ secrets.build_app_private_key }}
          owner: ${{ github.repository_owner }}

      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.registry_username }}
          password: ${{ secrets.registry_password }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.ARTIFACT_PREFIX }}-${{ matrix.suffix }}
          cache-to: type=gha,scope=${{ env.ARTIFACT_PREFIX }}-${{ matrix.suffix }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_PREFIX }}-digest-${{ matrix.suffix }}
          path: /tmp/digests/*
          if-no-files-found: error

      - name: Strip v prefix
        if: ${{ inputs.create_release }}
        id: strip-v
        run: echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Export Docker image
        if: ${{ inputs.create_release }}
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.strip-v.outputs.version }}
          outputs: type=docker,dest=${{ env.ARTIFACT_PREFIX }}-${{ matrix.suffix }}.docker.tar
          cache-from: type=gha,scope=${{ env.ARTIFACT_PREFIX }}-${{ matrix.suffix }}

      - name: Compress image
        if: ${{ inputs.create_release }}
        run: gzip ${{ env.ARTIFACT_PREFIX }}-${{ matrix.suffix }}.docker.tar

      - name: Upload image archive
        if: ${{ inputs.create_release }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_PREFIX }}-docker-image-${{ matrix.suffix }}
          path: ${{ env.ARTIFACT_PREFIX }}-${{ matrix.suffix }}.docker.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.ARTIFACT_PREFIX }}-digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.registry_username }}
          password: ${{ secrets.registry_password }}

      - name: Extract metadata for tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ env.VERSION }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.VERSION }},enable=${{ !contains(env.VERSION, '-') }}
            type=raw,value=latest,enable=${{ !contains(env.VERSION, '-') }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Download image archives
        if: ${{ inputs.create_release }}
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.ARTIFACT_PREFIX }}-docker-image-*
          path: /tmp/images
          merge-multiple: true

      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: |
            /tmp/images/${{ env.ARTIFACT_PREFIX }}-amd64.docker.tar.gz
            /tmp/images/${{ env.ARTIFACT_PREFIX }}-arm64.docker.tar.gz
          draft: true
